name: ci-cd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend lint
        working-directory: backend
        run: |
          npm install --legacy-peer-deps --force
          npm run lint

      - name: Frontend lint and build
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps --force
          npm run lint
          npm run build

      - name: Worker dependency check
        run: |
          python -m pip install --upgrade pip
          pip install -r worker/requirements.txt

  publish-images:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ github.sha }}

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ github.sha }}

      - name: Update infra repo image tags
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Abhishekyadav1807/infrarepo.git ../infra-repo-ci
          cd ../infra-repo-ci/k8s/staging
          sed -i "s/newTag: .*/newTag: ${GITHUB_SHA}/g" kustomization.yaml
          cd ../../
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update staging image tags to ${GITHUB_SHA}"
          git push
