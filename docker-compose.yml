version: "3.9"
services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - redis
    ports:
      - "5000:5000"

  worker:
    build: ./worker
    env_file:
      - ./worker/.env
    depends_on:
      - mongo
      - redis

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    ports:
      - "3000:8080"

volumes:
  mongo_data:
